name: Keep-alive ping

# Pings both the Streamlit Cloud frontend and the Hugging Face Spaces
# backend every 5 minutes so the free-tier hosts don't go to sleep.
# Without this, the first visit after a long idle takes ~30s of
# cold-start, which is a poor first impression for recruiters / demos.

on:
  schedule:
    # every 5 minutes (GitHub Actions cron's minimum granularity)
    - cron: "*/5 * * * *"
  workflow_dispatch:  # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - name: Ping Hugging Face Spaces backend (/health)
        run: |
          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" -m 30 \
            "https://Nikollass-chatsolveai-api.hf.space/health" || echo "000")
          echo "HF Space /health → HTTP $STATUS"

      - name: Warm up the RAG pipeline (one cheap query)
        env:
          CHATSOLVEAI_API_KEY: ${{ secrets.CHATSOLVEAI_API_KEY }}
        run: |
          # Sending a real /chat call ensures the FAISS index, embeddings
          # client, and OpenAI client are all instantiated rather than
          # waiting for the first user query to do that work.
          AUTH_ARGS=()
          if [ -n "$CHATSOLVEAI_API_KEY" ]; then
            AUTH_ARGS=(-H "X-API-Key: $CHATSOLVEAI_API_KEY")
          fi
          curl -L -s -m 60 -X POST \
            -H "Content-Type: application/json" \
            "${AUTH_ARGS[@]}" \
            -d '{"session_id":"keepalive-cron","query":"hello"}' \
            "https://Nikollass-chatsolveai-api.hf.space/chat" \
            -o /dev/null -w "Warm-up /chat → HTTP %{http_code}, %{time_total}s\n" || true

      # Streamlit Cloud's free-tier sleep detector counts WebSocket
      # sessions, not bare HTTP GETs. A `curl` to the root URL no longer
      # registers as activity, so the app sleeps anyway. Open the app
      # with headless Chromium via Playwright instead — that establishes
      # a real WebSocket session that Streamlit recognises as a visit.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-v1

      - name: Install Playwright + Chromium
        run: |
          pip install --quiet playwright
          # --with-deps installs system libs Chromium needs on the runner.
          python -m playwright install --with-deps chromium

      - name: Visit Streamlit app like a real browser
        run: |
          python <<'PY'
          import sys, time
          from playwright.sync_api import sync_playwright, TimeoutError as PWTimeout

          URL = "https://chatsolveai-nika.streamlit.app/"
          try:
              with sync_playwright() as p:
                  # Use a realistic Chrome on Linux signature and disable
                  # the automation flag so Streamlit Cloud's bot heuristics
                  # are less likely to discount the visit.
                  browser = p.chromium.launch(
                      headless=True,
                      args=[
                          "--disable-blink-features=AutomationControlled",
                          "--no-sandbox",
                      ],
                  )
                  ctx = browser.new_context(
                      user_agent=(
                          "Mozilla/5.0 (X11; Linux x86_64) "
                          "AppleWebKit/537.36 (KHTML, like Gecko) "
                          "Chrome/124.0 Safari/537.36"
                      ),
                      viewport={"width": 1366, "height": 900},
                      locale="en-US",
                  )
                  # Hide webdriver flag from page-side detection.
                  ctx.add_init_script(
                      "Object.defineProperty(navigator,'webdriver',{get:()=>undefined})"
                  )
                  page = ctx.new_page()
                  page.goto(URL, wait_until="domcontentloaded", timeout=90000)

                  # If the wake-up screen is showing, click the button and
                  # then wait for the actual app shell to load.
                  try:
                      btn = page.get_by_role(
                          "button", name="Yes, get this app back up!"
                      )
                      if btn.is_visible(timeout=3000):
                          print("App was asleep — clicking wake button.")
                          btn.click()
                          # Streamlit Cloud spin-up takes 20-40 s. Wait
                          # for the app's actual root selector to appear.
                          try:
                              page.wait_for_selector(
                                  "[data-testid='stApp']", timeout=90000
                              )
                              print("Streamlit container booted.")
                          except PWTimeout:
                              print(
                                  "Wake clicked but stApp didn't appear in 90 s.",
                                  file=sys.stderr,
                              )
                  except Exception:
                      pass

                  # Even if the app was already awake, ensure the main
                  # shell is present before counting the visit.
                  try:
                      page.wait_for_selector(
                          "[data-testid='stApp']", timeout=30000
                      )
                  except PWTimeout:
                      print("stApp not found — page may still be initial loading.")

                  # Hold the WebSocket session open long enough for
                  # Streamlit's activity counter to register a real
                  # visitor session. 60 s comfortably covers the
                  # platform's session-detection window.
                  page.wait_for_load_state("networkidle", timeout=60000)
                  page.wait_for_timeout(60000)
                  print(f"Streamlit visit OK: {page.title()}")
                  browser.close()
          except Exception as e:
              print(f"Streamlit visit error: {e}", file=sys.stderr)
              sys.exit(0)
          PY
