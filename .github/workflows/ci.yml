name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.api.txt pytest httpx

      - name: Run unit tests
        run: pytest -q tests/

  container-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile -t chatsolveai-api:test .

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: chatsolveai-api:test
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check all .py files
        run: |
          python -m compileall -q api pipeline tests app.py
