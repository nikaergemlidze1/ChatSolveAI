name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          # Pydantic + fastapi are enough for the model and intent tests —
          # no OpenAI / LangChain required.
          pip install "pydantic>=2.7" "fastapi>=0.111" pytest

      - name: Run unit tests
        run: pytest -q tests/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check all .py files
        run: |
          python -m compileall -q api pipeline tests app.py
